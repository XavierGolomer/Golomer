          ?h('div',{className:'card'},
              h('div',{style:{textAlign:'center',fontSize:'12px',color:'var(--text2)',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'1px'}},
                `${matchResult.isLeague?'Liga':'Simulacion'} · Semana ${matchResult.week} · ${matchResult.isHome?'Local':'Visitante'}`
              ),
              h('div',{className:'match-teams'},
                h('span',null,matchResult.isHome?matchResult.myTeam:matchResult.oppTeam),
                h('span',null,matchResult.isHome?matchResult.oppTeam:matchResult.myTeam)
              ),
              h('div',{className:'live-score'},`${matchResult.myG} - ${matchResult.oppG}`),
              h('div',{style:{textAlign:'center',marginBottom:'14px'}},
                h('span',{className:`result-badge ${matchResult.myG>matchResult.oppG?'W':matchResult.myG===matchResult.oppG?'D':'L'}`,style:{fontSize:'14px',padding:'4px 16px'}},
                  matchResult.myG>matchResult.oppG?'Victoria':matchResult.myG===matchResult.oppG?'Empate':'Derrota'
                )
              ),
              h('div',{className:'g4',style:{marginBottom:'14px'}},
                h('div',{className:'metric'},h('div',{className:'metric-lbl'},'xG local'),h('div',{className:'metric-val',style:{fontSize:'16px'}},matchResult.hxG||'-')),
                h('div',{className:'metric'},h('div',{className:'metric-lbl'},'xG visit.'),h('div',{className:'metric-val',style:{fontSize:'16px'}},matchResult.axG||'-')),
                h('div',{className:'metric'},h('div',{className:'metric-lbl'},'Ingresos'),h('div',{className:'metric-val green',style:{fontSize:'14px'}},fmt(matchResult.income))),
                h('div',{className:'metric'},h('div',{className:'metric-lbl'},'Salarios'),h('div',{className:'metric-val red',style:{fontSize:'14px'}},fmt(matchResult.salaryCost)))
              )
            )
          :h('div',{className:'card',style:{textAlign:'center',padding:'40px'}},
              h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'⚽'),
              h('p',{style:{color:'var(--text2)',marginBottom:'20px',fontSize:'15px'}},'No has jugado ningun partido todavia'),
              simPending
                ?h('div',null,
                    h('div',{className:'sim-countdown',style:{marginBottom:'8px'}},`${String(Math.floor((simCountdown||0)/60)).padStart(2,'0')}:${String((simCountdown||0)%60).padStart(2,'0')}`),
                    h('p',{style:{color:'var(--text2)',fontSize:'12px'}},'Simulacion en progreso...')
                  )
                :nextFixture&&canPlayNow(nextFixture.date)
                ?h('button',{className:'btn primary',style:{padding:'12px 28px'},onClick:()=>startLeagueMatch(nextFixture)},'Jugar partido de liga')
                :h('p',{style:{color:'var(--text2)',fontSize:'13px'}},'El proximo partido de liga no ha comenzado todavia')
            )
      ),

      // ── TACTICA ──
      tab==='Tactica'&&h('div',null,
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Formacion'),
          h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'16px'}},
            FORMATIONS.map(f=>h('button',{key:f,className:`btn ${team.formation===f?'primary':''}`,onClick:()=>setFormation(f)},f))
          ),
          h('div',{className:'sep'}),
          h('div',{className:'card-title',style:{marginBottom:'8px'}},'Tactica'),
          h('div',{className:'g2'},TACTICS.map(t=>h('div',{key:t.id,className:`tactic-opt ${team.tactic===t.id?'sel':''}`,onClick:()=>setTactic(t.id)},h('h3',null,t.label),h('p',null,t.desc))))
        )
      ),

      // ── ENTRENAMIENTO ──
      tab==='Entrenamiento'&&h('div',null,
        h('div',{className:'card',style:{marginBottom:'12px'}},
          h('div',{className:'card-title',style:{marginBottom:'12px'}},'Calendario semanal'),
          h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'8px'}},
            (()=>{
              const now=new Date();
              const wk=Math.floor(now.getTime()/(7*24*60*60*1000));
              const doneFriendly=(team._lastFriendlyWeek||0)>=wk;
              const doneTrain=(team._lastTrainWeek||0)>=wk;
              const nxt=nextTuesday12h(now);
              const nth=nextThursday6h(now);
              return [
                h('div',{key:'mar',style:{background:'rgba(232,184,75,0.07)',border:'1px solid rgba(232,184,75,0.2)',borderRadius:'10px',padding:'12px',textAlign:'center'}},
                  h('div',{style:{fontSize:'22px',marginBottom:'4px'}},'⚽'),
                  h('div',{style:{fontFamily:'"Bebas Neue",sans-serif',fontSize:'13px',color:'var(--gold)',letterSpacing:'1px'}},'AMISTOSO'),
                  h('div',{style:{fontSize:'11px',color:'var(--text2)',margin:'4px 0'}},'Martes · 12:00h'),
                  h('div',{style:{fontSize:'10px',color:doneFriendly?'var(--green)':'var(--text3)',marginTop:'4px'}},
                    doneFriendly?'✓ Jugado':'Próx: '+formatMatchDate(nxt.toISOString()))
                ),
                h('div',{key:'jue',style:{background:'rgba(63,185,80,0.07)',border:'1px solid rgba(63,185,80,0.2)',borderRadius:'10px',padding:'12px',textAlign:'center'}},
                  h('div',{style:{fontSize:'22px',marginBottom:'4px'}},'🏋️'),
                  h('div',{style:{fontFamily:'"Bebas Neue",sans-serif',fontSize:'13px',color:'var(--green)',letterSpacing:'1px'}},'ENTRENO'),
                  h('div',{style:{fontSize:'11px',color:'var(--text2)',margin:'4px 0'}},'Jueves · 06:00h'),
                  h('div',{style:{fontSize:'10px',color:doneTrain?'var(--green)':'var(--text3)',marginTop:'4px'}},
                    doneTrain?'✓ Completado':'Próx: '+formatMatchDate(nth.toISOString()))
                ),
                h('div',{key:'vie',style:{background:'rgba(88,166,255,0.07)',border:'1px solid rgba(88,166,255,0.2)',borderRadius:'10px',padding:'12px',textAlign:'center'}},
                  h('div',{style:{fontSize:'22px',marginBottom:'4px'}},'🏆'),
                  h('div',{style:{fontFamily:'"Bebas Neue",sans-serif',fontSize:'13px',color:'var(--blue)',letterSpacing:'1px'}},'LIGA'),
                  h('div',{style:{fontSize:'11px',color:'var(--text2)',margin:'4px 0'}},'Viernes · 21:00h'),
                  h('div',{style:{fontSize:'10px',color:'var(--text3)',marginTop:'4px'}},
                    nextFixture?('J'+nextFixture.jornada+' vs '+nextFixture.opp.slice(0,12)):'Sin jornada')
                )
              ];
            })()
          )
        ),

        h('div',{className:'card',style:{marginBottom:'12px'}},
          h('div',{className:'card-title',style:{marginBottom:'6px'}},'Foco de entrenamiento — '+team.trainFocus.toUpperCase()),
          h('p',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'12px',lineHeight:1.5}},'< 24 años mejoran el doble · Resistencia sube lento a todos · En posición correcta progresa más'),
          h('div',{className:'g2'},TRAIN_OPTIONS.map(o=>h('div',{key:o.id,className:`tactic-opt ${team.trainFocus===o.id?'sel':''}`,onClick:()=>setTrain(o.id)},h('h3',null,o.label),h('p',null,o.desc))))
        ),

        friendlyResult&&h('div',{className:'card',style:{marginBottom:'12px'}},
          h('div',{className:'card-title',style:{marginBottom:'8px'}},'Último amistoso · '+formatMatchDate(friendlyResult.date)),
          h('div',{style:{display:'flex',alignItems:'center',gap:'16px',justifyContent:'center',padding:'8px 0'}},
            h('div',{style:{flex:1,textAlign:'center'}},
              h('div',{style:{fontFamily:'"Bebas Neue",sans-serif',fontSize:'16px',color:'var(--gold)'}},(team.name||'Mi equipo').slice(0,14))),
            h('div',{style:{textAlign:'center',padding:'8px 16px',background:'var(--dark4)',borderRadius:'8px',minWidth:'70px'}},
              h('div',{style:{fontFamily:'"Bebas Neue",sans-serif',fontSize:'28px',color:
                friendlyResult.hG>friendlyResult.aG?'var(--green)':friendlyResult.hG<friendlyResult.aG?'var(--red)':'var(--text2)'}},
                friendlyResult.hG+' - '+friendlyResult.aG),
              h('div',{style:{fontSize:'9px',color:'var(--text3)'}},
                friendlyResult.hG>friendlyResult.aG?'VICTORIA':friendlyResult.hG<friendlyResult.aG?'DERROTA':'EMPATE')),
            h('div',{style:{flex:1,textAlign:'center'}},
              h('div',{style:{fontFamily:'"Bebas Neue",sans-serif',fontSize:'16px',color:'var(--text1)'}},(friendlyResult.vs||'').slice(0,14)))
          )
        ),

        trainLog.length>0
          ?h('div',{className:'card'},
              h('div',{className:'card-title',style:{marginBottom:'6px'}},'Informe entrenamiento del jueves'),
              h('p',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'10px'}},trainLog.length+' jugadores mejoraron esta semana · Foco: '+team.trainFocus),
              h('div',{style:{display:'flex',flexDirection:'column',gap:'5px',maxHeight:'260px',overflowY:'auto'}},
                trainLog.map((p,i)=>h('div',{key:i,style:{
                  display:'flex',alignItems:'center',gap:'10px',padding:'6px 10px',
                  background:'var(--dark4)',borderRadius:'6px',borderLeft:'3px solid var(--green)'}},
                  h('span',{style:{fontSize:'10px',color:'var(--text3)',minWidth:'30px',fontFamily:'"Bebas Neue",sans-serif'}},(p.pos||'').slice(0,3)),
                  h('span',{style:{flex:1,fontSize:'12px',color:'var(--text1)',fontWeight:500}},p.name),
                  h('div',{style:{display:'flex',flexDirection:'column',gap:'2px',alignItems:'flex-end'}},
                    (p.mejoras||[]).map((m,j)=>h('span',{key:j,style:{
                      fontSize:'10px',color:'var(--green)',background:'rgba(63,185,80,0.1)',
                      padding:'1px 6px',borderRadius:'4px'}},m))
                  )
                ))
              )
            )
          :h('div',{className:'card',style:{textAlign:'center',padding:'20px'}},
              h('div',{style:{fontSize:'28px',marginBottom:'8px'}},'📋'),
              h('div',{style:{color:'var(--text2)',fontSize:'12px'}},'El informe aparecerá aquí el próximo jueves a las 6:00h')
            )
      ),

      // ── MERCADO ──
      tab==='Mercado'&&h('div',null,
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Mercado de fichajes'),
          h('p',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'14px'}},'Coste = 26 semanas de salario. Clic en nombre para ver perfil.'),
          market.map(p=>h('div',{key:p.id,className:'transfer-row'},
            h('div',{style:{display:'flex',gap:'10px',alignItems:'center',cursor:'pointer'},onClick:()=>{setSelPlayer(p);setPlayerTab('basicas');setTab('Plantilla');}},
              h(Avatar,{name:p.name,pos:p.pos,size:40}),
              h('div',null,
                h('div',{style:{fontWeight:500}},p.name),
                h('div',{style:{fontSize:'12px',color:'var(--text2)'}},`${p.pos} · ${Math.floor(p.age)} anos · ${p.nationality}`),
                (Array.isArray(p.specials)?p.specials:Object.values(p.specials||{})).length>0&&h('div',{style:{marginTop:'3px'}},(Array.isArray(p.specials)?p.specials:Object.values(p.specials||{})).map(s=>h('span',{key:s,className:'badge badge-sp',style:{marginRight:'4px'}},s)))
              )
            ),
            h('div',{style:{display:'flex',gap:'14px',alignItems:'center'}},
              h('div',{style:{fontSize:'12px'}},['defensa','jugadas','anotacion'].map(s=>h('div',{key:s,style:{marginBottom:'2px'}},h('span',{style:{color:'var(--text2)'}},s.slice(0,3)+': '),h('span',{style:{color:skillColor(p.skills[s]),fontWeight:600}},p.skills[s])))),
              h('div',{style:{textAlign:'right',minWidth:'90px'}},
                h('div',{style:{fontWeight:600,color:'var(--gold)'}},fmt(p.salary*26)),
                h('div',{style:{fontSize:'11px',color:'var(--text2)'}},fmt(p.salary)+'/sem')
              ),
              h('button',{className:'btn success',onClick:()=>buyPlayer(p)},'Fichar')
            )
          ))
        )
      ),

      // ── LIGA ──
      tab==='Liga'&&h('div',null,
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Clasificacion — Temporada 1'),
          sortedLeague.length===0
            ?h('p',{style:{color:'var(--text2)',textAlign:'center',padding:'20px'}},'Cargando liga...')
            :h('table',null,
                h('thead',null,h('tr',null,h('th',null,'#'),h('th',null,'Equipo'),h('th',null,''),h('th',null,'PJ'),h('th',null,'PG'),h('th',null,'PE'),h('th',null,'PP'),h('th',null,'GF'),h('th',null,'GC'),h('th',null,'DG'),h('th',null,'Pts'))),
                h('tbody',null,sortedLeague.map((t,i)=>{
                  const posCls=i===0?'pos-1':i===1?'pos-2':i===2?'pos-3':'';
                  return h('tr',{key:t.id||t.name,className:t.username===user?'standing-me':''},
                    h('td',null,h('span',{className:`pos-pill ${posCls}`},i+1)),
                    h('td',{style:{fontWeight:500}},t.name),
                    h('td',null,t.isBot?h('span',{style:{fontSize:'10px',color:'var(--text3)',background:'var(--dark4)',padding:'1px 5px',borderRadius:'3px'}},'BOT'):h('span',{style:{fontSize:'10px',color:'var(--green)',background:'rgba(63,185,80,0.1)',padding:'1px 5px',borderRadius:'3px'}},'REAL')),
                    h('td',null,t.pj),h('td',null,t.pg),h('td',null,t.pe),h('td',null,t.pp),
                    h('td',null,t.gf),h('td',null,t.gc),
                    h('td',null,t.gf-t.gc>=0?`+${t.gf-t.gc}`:t.gf-t.gc),
                    h('td',{style:{fontFamily:'"Bebas Neue"',fontSize:'18px',color:'var(--gold)'}},t.pts)
                  );
                }))
              )
        ),
        // Full schedule
        h('div',{className:'card'},
          h('div',{className:'card-title'},'Calendario completo'),
          league&&league.schedule.map(j=>h('div',{key:j.jornada,style:{marginBottom:'12px'}},
            h('div',{className:'jornada-header'},
              h('span',{className:'jornada-num'},`J${j.jornada}`),
              h('span',{className:'jornada-date'},formatMatchDate(j.date))
            ),
            j.matches.map((m,i)=>{
              const home=league.teams.find(t=>t.id===m.home);
              const away=league.teams.find(t=>t.id===m.away);
              const isMyMatch=(home?.username===user||away?.username===user);
              return h('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 8px',borderRadius:'6px',background:isMyMatch?'rgba(240,192,64,0.05)':'transparent',marginBottom:'2px',border:isMyMatch?'1px solid rgba(240,192,64,0.1)':'1px solid transparent'}},
                h('span',{style:{fontSize:'12px',fontWeight:isMyMatch?600:400}},`${home?.name||'?'} vs ${away?.name||'?'}`),
                m.played
                  ?h('span',{className:'result-score',style:{fontSize:'14px',color:'var(--text2)'}},`${m.scoreH}-${m.scoreA}`)
                  :h('span',{style:{fontSize:'11px',color:'var(--text2)'}},'Pendiente')
              );
            })
          ))
        )
      ),

      // ── FINANZAS ──
      tab==='Finanzas'&&h('div',null,
        h('div',{className:'g2'},
          h('div',{className:'card'},
            h('div',{className:'card-title'},'Balance semanal'),
            h('div',{className:'g2',style:{marginBottom:'12px'}},
              h('div',{className:'metric'},h('div',{className:'metric-lbl'},'Caja'),h('div',{className:`metric-val ${team.money>0?'green':'red'}`},fmt(team.money))),
              h('div',{className:'metric'},h('div',{className:'metric-lbl'},'Salarios/sem'),h('div',{className:'metric-val red'},fmt(totalSalary)))
            ),
            h('table',null,h('tbody',null,
              h('tr',null,h('td',{style:{color:'var(--text2)'}},'Estadio'),h('td',{style:{textAlign:'right'}},team.stadium.cap.toLocaleString('es-ES')+' esp.')),
              h('tr',null,h('td',{style:{color:'var(--text2)'}},'Ingr. taquilla est./sem'),h('td',{style:{textAlign:'right',color:'var(--green)'}},fmt(Math.round(team.stadium.cap*12*0.7)))),
              h('tr',null,h('td',{style:{color:'var(--text2)'}},'Patrocinio est./sem'),h('td',{style:{textAlign:'right',color:'var(--green)'}},fmt(35000))),
              h('tr',null,h('td',{style:{color:'var(--text2)'}},'Salarios/sem'),h('td',{style:{textAlign:'right',color:'var(--red)'}},fmt(-totalSalary))),
              h('tr',null,h('td',{style:{fontWeight:600}},'Balance neto est.'),h('td',{style:{textAlign:'right',fontWeight:700,fontFamily:'"Bebas Neue"',fontSize:'18px',color:Math.round(team.stadium.cap*12*0.7)+35000-totalSalary>0?'var(--green)':'var(--red)'}},fmt(Math.round(team.stadium.cap*12*0.7)+35000-totalSalary)))
            ))
          ),
          h('div',{className:'card'},
            h('div',{className:'card-title'},'Top salarios'),
            h('table',null,
              h('thead',null,h('tr',null,h('th',null,''),h('th',null,'Jugador'),h('th',null,'Pos'),h('th',null,'Salario/sem'))),
              h('tbody',null,[...team.players].sort((a,b)=>b.salary-a.salary).slice(0,10).map(p=>
                h('tr',{key:p.id},h('td',null,h(Avatar,{name:p.name,pos:p.pos,size:28})),h('td',null,p.name),h('td',null,h('span',{className:'badge badge-pos'},p.pos)),h('td',{style:{fontWeight:600,color:'var(--gold)'}},fmt(p.salary)))
              ))
            )
          )
        )
      )
    )
  );
}

ReactDOM.render(h(App), document.getElementById('app'));
</script>
</body>
</html>
