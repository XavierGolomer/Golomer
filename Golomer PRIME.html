<style>

:root {

  --dark: #0d1117;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {

}

/* LOGO */

/* HEADER */

}

}
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

.content { padding: 20px; max-width: 1040px; margin: 0 auto; }

.g3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }

async function dbLoad(username) {

}
async function dbSave(username, team) {

// ── TIME UTILS (Madrid TZ) ────────────────────────────────────────────────────
function nextWeekday(from, targetDay, h, m) {
  // targetDay: 0=Dom, 1=Lun, 2=Mar, 3=Mie, 4=Jue, 5=Vie, 6=Sab
  const d = new Date(from || Date.now());
  const day = d.getDay();
  let diff = targetDay - day;
  if (diff <= 0) diff += 7;
  const target = new Date(d);
  target.setDate(target.getDate() + diff);
  target.setHours(0,0,0,0);
  const offset = getMadridOffset(target);
  const utcH = h - offset;
  target.setUTCHours(utcH, m||0, 0, 0);
  return target;
}

function nextFriday21h(from) { return nextWeekday(from, 5, 21, 0); }
function nextTuesday12h(from) { return nextWeekday(from, 2, 12, 0); }
function nextThursday6h(from)  { return nextWeekday(from, 4, 6, 0); }

function nextSaturday21h(from) {
  // Returns the next Saturday at 21:00 Madrid time from given date
  const d = new Date(from || Date.now());
  const day = d.getDay(); // 0=Sun, 6=Sat
  const daysUntilSat = day === 6 ? 7 : (6 - day);
  const sat = new Date(d);
  sat.setDate(sat.getDate() + daysUntilSat);
  sat.setHours(0,0,0,0);
  const madridOffset = getMadridOffset(sat);
  const utcH = 21 - madridOffset;
  sat.setUTCHours(utcH, 0, 0, 0);
  return sat;
}

function getMadridOffset(d) {
  // Europe/Madrid: UTC+1 in winter, UTC+2 in summer (DST)
  // DST: last Sunday of March to last Sunday of October
  const year = d.getFullYear();
  const dstStart = lastSundayOf(year, 2); // March (month 2, 0-indexed)
  const dstEnd   = lastSundayOf(year, 9); // October
  return (d >= dstStart && d < dstEnd) ? 2 : 1;
}

function lastSundayOf(year, month) {
  const d = new Date(Date.UTC(year, month+1, 1));
  d.setUTCDate(d.getUTCDate() - 1); // last day of month
  while(d.getUTCDay() !== 0) d.setUTCDate(d.getUTCDate()-1);
  d.setUTCHours(1,0,0,0); // 01:00 UTC = change moment
  return d;
}

function generateSeason14Dates(startFrom) {
  // 14 jornadas, cada viernes a las 21h
  const dates = [];
  let current = nextFriday21h(startFrom || Date.now());
  for(let i=0; i<14; i++) {
    dates.push(new Date(current));
    current = new Date(current.getTime() + 7*24*60*60*1000);
  }
  return dates.map(d => d.toISOString());
}

function formatMatchDate(isoString) {
  const d = new Date(isoString);
  const offset = getMadridOffset(d);
  const local = new Date(d.getTime() + offset*3600000);
  const days = ['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${days[local.getUTCDay()]} ${local.getUTCDate()} ${months[local.getUTCMonth()]} — ${String(local.getUTCHours()).padStart(2,'0')}:${String(local.getUTCMinutes()).padStart(2,'0')}h`;
}

function getCountdown(isoString) {
  const diff = new Date(isoString).getTime() - Date.now();
  if(diff <= 0) return null;
  const d = Math.floor(diff / 86400000);
  const h2 = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  if(d > 0) return `${d}d ${String(h2).padStart(2,'0')}h ${String(m).padStart(2,'0')}m`;
  return `${String(h2).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// Firebase guarda arrays como objetos {0:{...},1:{...}} — esto lo normaliza de vuelta a arrays
function normalizeTeam(t) {
  if(!t) return t;
  const players=Array.isArray(t.players)?t.players:t.players?Object.values(t.players):[];
  const results=Array.isArray(t.results)?t.results:t.results?Object.values(t.results):[];
  const normPlayers=players.map(p=>({
    ...p,
    specials: Array.isArray(p.specials)?p.specials:p.specials?Object.values(p.specials):[],
    skills: p.skills||{},
    advSkills: p.advSkills||{velocidad:10,agresividad:10,vision:10,fisico:10,tecnica:10},
  }));
  return {...t, players:normPlayers, results};
}

function hashCode(str) {
  let hash = 0;
  for(let i = 0; i < str.length; i++) { hash = ((hash << 5) - hash) + str.charCodeAt(i); hash |= 0; }
  return Math.abs(hash);
}

function genPlayer(pos, quality) {

  const sk={};
  sk['porteria']=pos==='POR'?clamp(q+rnd(0,4),1,20):clamp(rnd(1,3),1,20);
  sk['defensa']=['DFC','CAR'].includes(pos)?clamp(q+rnd(0,3),1,20):clamp(q+rnd(-4,0),1,20);
  sk['jugadas']=['MED','MCO'].includes(pos)?clamp(q+rnd(0,3),1,20):clamp(q+rnd(-3,1),1,20);
  sk['lateral']=['LAT','EXT'].includes(pos)?clamp(q+rnd(0,3),1,20):clamp(q+rnd(-5,-1),1,20);
  sk['anotacion']=['DEL','EXT'].includes(pos)?clamp(q+rnd(0,4),1,20):clamp(q+rnd(-5,-1),1,20);
  sk['balon parado']=clamp(q+rnd(-3,3),1,20);
  sk['experiencia']=clamp(rnd(1,Math.min(age-15,12)),1,20);
  sk['resistencia']=clamp(q+rnd(-2,2),1,20);
  sk['liderazgo']=clamp(rnd(1,15),1,20);
  const adv={velocidad:clamp(rnd(3,18),1,20),agresividad:clamp(rnd(2,16),1,20),vision:clamp(rnd(2,18),1,20),fisico:clamp(rnd(4,18),1,20),tecnica:clamp(q+rnd(-2,3),1,20)};
  const spPool=pos==='POR'?['Portero poderoso','Destructor']:['DFC','CAR'].includes(pos)?['Marcaje al hombre','Destructor','Cabezazo']:['LAT','EXT'].includes(pos)?['Lateral','Carreras','Regates']:['MED','MCO'].includes(pos)?['Pase largo','Carreras','Regates']:['Anotador','Cabezazo','Volea','Regates'];
  const specials=[];
  if(Math.random()<0.35) specials.push(spPool[rnd(0,spPool.length-1)]);
  if(Math.random()<0.12){const s2=spPool[rnd(0,spPool.length-1)];if(!specials.includes(s2))specials.push(s2);}
  const salary=Math.round(clamp(q*320+rnd(-100,100),400,4500)/50)*50;
  return {id:Date.now()+Math.random(),name:genName(),pos,age,skills:sk,advSkills:adv,specials,form:rnd(4,8),salary,tsi:rnd(500,60000),nationality:['Espana','Argentina','Brasil','Francia','Portugal','Alemania','Italia','Holanda','Japon','Senegal','Nigeria','Turquia'][rnd(0,11)],injury:0,yellowCards:0};
}

// ── LEAGUE ARCHITECTURE ───────────────────────────────────────────────────────
// League stored in golomer_league table:
// { season, teams:[{id,name,username,isBot,pts,pj,pg,pe,pp,gf,gc}], schedule:[{jornada,date,matches:[{home,away,played,scoreH,scoreA}]}] }

function generateSchedule(teamIds, startFrom) {
  // Round-robin 2 vueltas (14 jornadas para 8 equipos = 7+7)
  const n=teamIds.length, dates=generateSeason14Dates(startFrom);
  const schedule=[];
  // first leg round-robin
  function roundRobin(ids) {
    const rounds=[];
    const teams=[...ids];
    const n2=teams.length;
    for(let r=0;r<n2-1;r++) {
      const round=[];
      for(let i=0;i<n2/2;i++) {
        round.push({home:teams[i],away:teams[n2-1-i]});
      }
      rounds.push(round);
      teams.splice(1,0,teams.pop());
    }
    return rounds;
  }
  const leg1=roundRobin(teamIds);
  const leg2=leg1.map(round=>round.map(m=>{return {home:m.away,away:m.home};}));
  const allRounds=[...leg1,...leg2];
  allRounds.forEach((round,i)=>{
    schedule.push({
      jornada:i+1,
      date:dates[i]||dates[dates.length-1],
      matches:round.map(m=>{return {home:m.home,away:m.away,played:false,scoreH:null,scoreA:null};}),
    });
  });
  return schedule;
}

function initLeague(teamEntries) {
  // teamEntries: [{id,name,username,isBot}]
  const teams=teamEntries.map(t=>{return {...t,pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};} );
  const schedule=generateSchedule(teamEntries.map(t=>t.id), Date.now());
  return {season:1,teams,schedule,created:new Date().toISOString()};
}

// ── RATINGS & MATCH ───────────────────────────────────────────────────────────
function calcRatings(team,tactic) {
  const rawPlayers=team.players;
  const playersArr=Array.isArray(rawPlayers)?rawPlayers:rawPlayers?Object.values(rawPlayers):[];
  const st=playersArr.slice(0,11);
  if(!st.length) return {atkL:5,atkR:5,atkC:5,mid:5,defL:5,defC:5,defR:5};
  let atkL=0,atkR=0,atkC=0,mid=0,defL=0,defC=4,defR=0;
  st.forEach(p=>{
    const specials=Array.isArray(p.specials)?p.specials:p.specials?Object.values(p.specials):[];
    const adv=p.advSkills||{};
    const sk=p.skills||{};
    const base=(adv.tecnica||5)/10+(adv.vision||5)/15+(sk.experiencia||1)*0.18+(sk.resistencia||1)*0.12+((p.form||5)-5)*0.1+specials.length*0.25;
    if(['DFC','CAR'].includes(p.pos)){defC+=sk.defensa*0.7+base;defL+=sk.defensa*0.25+base*0.4;defR+=sk.defensa*0.25+base*0.4;}
    if(p.pos==='POR') defC+=sk.porteria*1.3+base;
    if(p.pos==='LAT'){defL+=sk.defensa*0.4+sk.lateral*0.3+base;defR+=sk.defensa*0.4+sk.lateral*0.3+base;atkL+=sk.lateral*0.4+base;atkR+=sk.lateral*0.4+base;}
    if(['MED','MCO'].includes(p.pos)){mid+=sk.jugadas*0.65+base;atkC+=sk.jugadas*0.2+base*0.4;}
    if(['DEL','EXT'].includes(p.pos)){atkC+=sk.anotacion*0.55+sk.jugadas*0.18+base;atkL+=sk.lateral*0.18+base*0.25;atkR+=sk.lateral*0.18+base*0.25;}
  });
  const n=st.length;
  let r={atkL:atkL/n,atkR:atkR/n,atkC:atkC/n,mid:mid/n,defL:defL/n,defC:defC/n,defR:defR/n};
  const t=tactic||'normal';
  if(t==='atk'){r.atkC+=1.5;r.atkL+=0.7;r.atkR+=0.7;r.defC-=1;}
  if(t==='def'){r.defC+=1.5;r.defL+=0.7;r.defR+=0.7;r.atkC-=1;}
  if(t==='pressing'){r.mid+=1;r.defC-=0.5;}
  if(t==='aow'){r.atkL+=2;r.atkR-=1;}
  Object.keys(r).forEach(k=>r[k]=Math.max(1,Math.min(20,r[k])));
  return r;
}

function quickSimulate(homeTeam,awayTeam) {
  const hr=calcRatings(homeTeam,homeTeam.tactic),ar=calcRatings(awayTeam,awayTeam.tactic);
  const hAdv=1.1,midR=(hr.mid*hAdv)/((hr.mid*hAdv)+(ar.mid||1));
  let hG=0,aG=0; const events=[];
  for(let min=1;min<=90;min++) {
    const tick=Math.random();
    if(tick<0.072) {
      const atk=(hr.atkC*0.5+hr.atkL*0.25+hr.atkR*0.25)*hAdv*midR,def=ar.defC;
      const xg=clamp(atk/(atk+def)*0.52,0,0.88);
      const atkers=homeTeam.players.filter(p=>['DEL','EXT','MCO'].includes(p.pos));
      const sp=atkers.find(p=>p.specials.includes('Anotador')||p.specials.includes('Cabezazo'));
      if(Math.random()<(sp?xg*1.28:xg)) { hG++; const sc=atkers[rnd(0,Math.max(0,atkers.length-1))]||homeTeam.players[7]; events.push({min,type:'goal',team:'home',player:sc.name,score:`${hG}-${aG}`}); }
    }
    if(tick>0.928) {
      const atk=(ar.atkC*0.5+ar.atkL*0.25+ar.atkR*0.25)*(1-midR+0.08),def=hr.defC*hAdv;
      const xg=clamp(atk/(atk+def)*0.52,0,0.88);
      const atkers=awayTeam.players.filter(p=>['DEL','EXT','MCO'].includes(p.pos));
      const sp=atkers.find(p=>p.specials.includes('Anotador')||p.specials.includes('Volea'));
      if(Math.random()<(sp?xg*1.22:xg)) { aG++; const sc=atkers[rnd(0,Math.max(0,atkers.length-1))]||awayTeam.players[7]; events.push({min,type:'goal',team:'away',player:sc.name,score:`${hG}-${aG}`}); }
    }
    if([20,45,65,80].includes(min)) {
      const hBP=homeTeam.players.find(p=>p.skills['balon parado']>=10);
      if(hBP&&Math.random()<0.16){hG++;events.push({min,type:'goal',team:'home',player:hBP.name,score:`${hG}-${aG}`,detail:'Balon parado'});}
      const aBP=awayTeam.players.find(p=>p.skills['balon parado']>=10);
      if(aBP&&Math.random()<0.13){aG++;events.push({min,type:'goal',team:'away',player:aBP.name,score:`${hG}-${aG}`,detail:'Balon parado'});}
    }
  }
  const att=Math.min(homeTeam.stadium.cap,Math.floor(homeTeam.stadium.cap*(0.45+Math.random()*0.55)));
  return {hG,aG,events,attendance:att,ticketIncome:att*rnd(10,18),sponsorIncome:rnd(25000,45000),ratings:{home:hr,away:ar}};
}

// Update league standings after a match
function applyMatchResult(league, jornada, matchIdx, hG, aG) {
  const sched=[...league.schedule];
  const jIdx=sched.findIndex(j=>j.jornada===jornada);
  if(jIdx===-1) return league;
  const jornadaCopy={...sched[jIdx],matches:[...sched[jIdx].matches]};
  const match={...jornadaCopy.matches[matchIdx],played:true,scoreH:hG,scoreA:aG};
  jornadaCopy.matches[matchIdx]=match;
  sched[jIdx]=jornadaCopy;
  const teams=league.teams.map(t=>{
    if(t.id===match.home) {
      const pts=hG>aG?3:hG===aG?1:0;
      return {...t,pts:t.pts+pts,pj:t.pj+1,pg:t.pg+(hG>aG?1:0),pe:t.pe+(hG===aG?1:0),pp:t.pp+(hG<aG?1:0),gf:t.gf+hG,gc:t.gc+aG};
    }
    if(t.id===match.away) {
      const pts=aG>hG?3:aG===hG?1:0;
      return {...t,pts:t.pts+pts,pj:t.pj+1,pg:t.pg+(aG>hG?1:0),pe:t.pe+(aG===hG?1:0),pp:t.pp+(aG<hG?1:0),gf:t.gf+aG,gc:t.gc+hG};
    }
    return t;
  });
  return {...league,teams,schedule:sched};
}

// ── WEB AUDIO SOUND ENGINE ────────────────────────────────────────────────────
function createAudio(){
  try{return new (window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
}
function playSound(type,audioCtx){
  if(!audioCtx) return;
  try{
    const now=audioCtx.currentTime;
    if(type==='goal'){
      // Crowd roar: layered noise bursts
      for(let i=0;i<4;i++){
        const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*1.5,audioCtx.sampleRate);
        const d=buf.getChannelData(0);
        for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*Math.max(0,1-j/d.length);
        const src=audioCtx.createBufferSource();
        src.buffer=buf;
        const g=audioCtx.createGain(); g.gain.setValueAtTime(0.18+i*0.04,now+i*0.12);
        g.gain.exponentialRampToValueAtTime(0.001,now+1.5+i*0.1);
        const f=audioCtx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=400+i*200;
        src.connect(f); f.connect(g); g.connect(audioCtx.destination);
        src.start(now+i*0.12);
      }
      // Horn/whistle synth
      const osc=audioCtx.createOscillator(); osc.type='sawtooth'; osc.frequency.setValueAtTime(880,now);
      osc.frequency.exponentialRampToValueAtTime(1760,now+0.1);
      const og=audioCtx.createGain(); og.gain.setValueAtTime(0.3,now); og.gain.exponentialRampToValueAtTime(0.001,now+0.6);
      osc.connect(og); og.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.6);
    } else if(type==='whistle'){
      const osc=audioCtx.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(1800,now);
      osc.frequency.setValueAtTime(1600,now+0.08); osc.frequency.setValueAtTime(1800,now+0.16);
      const g=audioCtx.createGain(); g.gain.setValueAtTime(0.25,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.3);
      osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.3);
    } else if(type==='yellow'){
      // Sharp beep
      const osc=audioCtx.createOscillator(); osc.type='square'; osc.frequency.value=600;
      const g=audioCtx.createGain(); g.gain.setValueAtTime(0.15,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.2);
      osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.2);
    } else if(type==='crowd_low'){
      // Low ambient crowd murmur
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.8,audioCtx.sampleRate);
      const d=buf.getChannelData(0);
      for(let j=0;j<d.length;j++) d[j]=(Math.random()*2-1)*0.05;
      const src=audioCtx.createBufferSource();src.buffer=buf;
      const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=300;
      const g=audioCtx.createGain();g.gain.setValueAtTime(0.4,now);g.gain.exponentialRampToValueAtTime(0.001,now+0.8);
      src.connect(f);f.connect(g);g.connect(audioCtx.destination);src.start(now);
    } else if(type==='kick'){
      // Ball kick thud
      const osc=audioCtx.createOscillator(); osc.type='sine'; osc.frequency.setValueAtTime(180,now); osc.frequency.exponentialRampToValueAtTime(40,now+0.08);
      const g=audioCtx.createGain(); g.gain.setValueAtTime(0.4,now); g.gain.exponentialRampToValueAtTime(0.001,now+0.12);
      osc.connect(g); g.connect(audioCtx.destination); osc.start(now); osc.stop(now+0.12);
    }
  }catch(e){}
}

// ── MATCH SIMULATION ENGINE ───────────────────────────────────────────────────
function generateMatchEvents(homeTeam,awayTeam){
  const events=[];
  const hAtk=(homeTeam.ratings&&homeTeam.ratings.attack||8)+1.5;
  const hDef=(homeTeam.ratings&&homeTeam.ratings.defense||8);
  const aAtk=(awayTeam.ratings&&awayTeam.ratings.attack||8);
  const aDef=(awayTeam.ratings&&awayTeam.ratings.defense||8);
  function rndInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
  const used=new Set();
  function uniqueMin(base,spread){
    spread=spread||4;
    let m=base+rndInt(-spread,spread);
    m=Math.max(1,Math.min(89,m));
    let tries=0;
    while(used.has(m)&&tries<20){m=(m%89)+1;tries++;}
    used.add(m); return m;
  }
  const hGoals=Math.max(0,Math.round((hAtk-aDef*0.7)/3+(Math.random()-0.4)*2));
  const aGoals=Math.max(0,Math.round((aAtk-hDef*0.7)/3+(Math.random()-0.5)*2));
  for(let i=0;i<hGoals;i++){
    const sc=homeTeam.players.filter(p=>['DEL','EXT','MCO'].includes(p.pos));
    const scorer=sc[rndInt(0,sc.length-1)]||homeTeam.players[rndInt(8,10)];
    events.push({min:uniqueMin(rndInt(5,88)),type:'goal',team:'home',
      text:'¡GOOOL! ¡'+((scorer&&scorer.name&&scorer.name.split(' ')[0])||'Gol')+'! '+pickComm(COMM_GOAL),icon:'⚽'});
  }
  for(let i=0;i<aGoals;i++){
    const sc=awayTeam.players.filter(p=>['DEL','EXT','MCO'].includes(p.pos));
    const scorer=sc[rndInt(0,sc.length-1)]||awayTeam.players[rndInt(8,10)];
    events.push({min:uniqueMin(rndInt(5,88)),type:'goal',team:'away',
      text:'¡GOOOL! ¡'+((scorer&&scorer.name&&scorer.name.split(' ')[0])||'Gol')+'! '+pickComm(COMM_GOAL),icon:'⚽'});
  }
  const yellows=rndInt(1,4);
  for(let i=0;i<yellows;i++){
    const isH=Math.random()>0.5;
    const t=isH?homeTeam:awayTeam;
    const p=t.players[rndInt(1,10)];
    events.push({min:uniqueMin(rndInt(10,85)),type:'yellow',team:isH?'home':'away',
      text:'Amarilla para '+((p&&p.name&&p.name.split(' ')[0])||'jugador')+'. '+pickComm(COMM_YELLOW),icon:'🟨'});
  }
  for(let i=0;i<rndInt(4,7);i++)
    events.push({min:uniqueMin(rndInt(5,88)),type:'foul',team:Math.random()>0.5?'home':'away',text:pickComm(COMM_FOUL),icon:'🦵'});
  for(let i=0;i<rndInt(2,6);i++)
    events.push({min:uniqueMin(rndInt(5,88)),type:'corner',team:Math.random()>0.5?'home':'away',text:pickComm(COMM_CORNER),icon:'🚩'});
  for(let i=0;i<rndInt(2,5);i++)
    events.push({min:uniqueMin(rndInt(5,88)),type:'miss',team:Math.random()>0.5?'home':'away',text:pickComm(COMM_MISS),icon:'💨'});
  for(let i=0;i<rndInt(3,5);i++)
    events.push({min:uniqueMin(rndInt(5,88)),type:'danger',team:'neutral',text:pickComm(COMM_DANGER),icon:'⚡'});
  for(let i=0;i<rndInt(2,4);i++)
    events.push({min:uniqueMin(rndInt(5,88)),type:'possession',team:'neutral',text:pickComm(COMM_POSSESSION),icon:'🔵'});
  events.sort((a,b)=>a.min-b.min);
  return {events,homeGoals:hGoals,awayGoals:aGoals};
}

// ── LIVE MATCH VISUALIZER ─────────────────────────────────────────────────────
function LiveMatch({matchData,homeTeam,awayTeam,onFinish}){
  const HALF_BREAK=15; // real seconds for halftime
  const TOTAL_PLAY=90*60;
  const TOTAL_SECS=TOTAL_PLAY+HALF_BREAK;

  const [sec,setSec]=useState(0);
  const [speed,setSpeed]=useState(10);
  const [paused,setPaused]=useState(false);
  const [isHalf,setIsHalf]=useState(false);
  const [finished,setFinished]=useState(false);
  const [log,setLog]=useState([{min:0,text:pickComm(COMM_KICKOFF),icon:'🎙️',type:'kickoff'}]);
  const [pending,setPending]=useState(matchData.events.slice());
  const [audioCtx,setAudioCtx]=useState(null);

  // Ball position (0-100 x, 0-100 y on pitch)
  const [ball,setBall]=useState({x:50,y:50});
  const [ballTarget,setBallTarget]=useState({x:50,y:50});
  const [phase,setPhase]=useState('possession'); // possession|attack|defend|corner|goal

  // Player positions: array of 22 objects {x,y,team}
  const [players,setPlayers]=useState(()=>initPlayers());
  const [playerTargets,setPlayerTargets]=useState(()=>initPlayers());

  const intervalRef=useRef(null);
  const animRef=useRef(null);
  const logRef=useRef(null);
  const pendingRef=useRef(matchData.events.slice());
  const ballRef=useRef({x:50,y:50});
  const ballTargetRef=useRef({x:50,y:50});
  const playersRef=useRef(initPlayers());
  const targetsRef=useRef(initPlayers());
  const phaseRef=useRef('possession');
  const secRef=useRef(0);

  // Posiciones base por formación (x=0-100, y=0-100, home ataca hacia arriba=y menor)
  // Cada entrada: [x, y, role]  role: 'GK','CB','FB','MID','ATT','WG'
  const FORMATION_POSITIONS = {
    '4-4-2': [
      [50,88,'GK'],
      [22,72,'CB'],[38,72,'CB'],[62,72,'CB'],[78,72,'FB'],
      [18,52,'WG'],[38,52,'MID'],[62,52,'MID'],[82,52,'WG'],
      [35,28,'ATT'],[65,28,'ATT']
    ],
    '4-3-3': [
      [50,88,'GK'],
      [22,72,'CB'],[38,72,'CB'],[62,72,'CB'],[78,72,'FB'],
      [30,52,'MID'],[50,48,'MID'],[70,52,'MID'],
      [20,25,'WG'],[50,22,'ATT'],[80,25,'WG']
    ],
    '4-5-1': [
      [50,88,'GK'],
      [22,72,'CB'],[38,72,'CB'],[62,72,'CB'],[78,72,'FB'],
      [15,52,'WG'],[32,52,'MID'],[50,50,'MID'],[68,52,'MID'],[85,52,'WG'],
      [50,25,'ATT']
    ],
    '3-5-2': [
      [50,88,'GK'],
      [30,72,'CB'],[50,74,'CB'],[70,72,'CB'],
      [15,52,'WG'],[32,52,'MID'],[50,50,'MID'],[68,52,'MID'],[85,52,'WG'],
      [35,28,'ATT'],[65,28,'ATT']
    ],
    '5-3-2': [
      [50,88,'GK'],
      [15,72,'FB'],[30,74,'CB'],[50,76,'CB'],[70,74,'CB'],[85,72,'FB'],
      [30,52,'MID'],[50,50,'MID'],[70,52,'MID'],
      [35,28,'ATT'],[65,28,'ATT']
    ],
    '4-4-1-1': [
      [50,88,'GK'],
      [22,72,'CB'],[38,72,'CB'],[62,72,'CB'],[78,72,'FB'],
      [18,52,'WG'],[38,52,'MID'],[62,52,'MID'],[82,52,'WG'],
      [50,38,'MID'],[50,22,'ATT']
    ],
  };

  function getFormationPositions(formation) {
    return FORMATION_POSITIONS[formation] || FORMATION_POSITIONS['4-4-2'];
  }

  function initPlayers(){
    const arr=[];
    const hFormation = homeTeam.formation||'4-4-2';
    const aFormation = awayTeam.formation||'4-4-2';
    const hPositions = getFormationPositions(hFormation);
    const aPositions = getFormationPositions(aFormation);
    const hPlayers = homeTeam.players||[];
    const aPlayers = awayTeam.players||[];
    // Home team: ataca hacia arriba (y bajo), portería en y=88
    for(let i=0;i<11;i++){
      const [bx,by,role]=hPositions[i]||[50,50,'MID'];
      const name=(hPlayers[i]?.name||'').split(' ').pop().slice(0,8);
      arr.push({x:bx,y:by,team:'home',role,name,base:{x:bx,y:by}});
    }
    // Away team: ataca hacia abajo (y alto), espejado verticalmente
    for(let i=0;i<11;i++){
      const [bx,by,role]=aPositions[i]||[50,50,'MID'];
      const mx=100-bx, my=100-by;
      const name=(aPlayers[i]?.name||'').split(' ').pop().slice(0,8);
      arr.push({x:mx,y:my,team:'away',role,name,base:{x:mx,y:my}});
    }
    return arr;
  }

  function rnd(a,b){return Math.random()*(b-a)+a;}
  function rndInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

  // Pick ball target based on phase
  function pickBallTarget(ph,team){
    if(ph==='goal')    return {x:team==='home'?rnd(42,58):rnd(42,58), y:team==='home'?rnd(2,8):rnd(92,98)};
    if(ph==='corner')  return {x:team==='home'?rnd(0,5):rnd(95,100), y:team==='home'?rnd(0,5):rnd(95,100)};
    if(ph==='attack')  return {x:rnd(20,80), y:team==='home'?rnd(5,35):rnd(65,95)};
    if(ph==='defend')  return {x:rnd(20,80), y:team==='home'?rnd(65,95):rnd(5,35)};
    if(ph==='miss')    return {x:rnd(30,70), y:team==='home'?rnd(0,20):rnd(80,100)};
    // possession - midfield
    return {x:rnd(20,80), y:rnd(30,70)};
  }

  // Pick player targets based on phase, ball and role — FM/FIFA style
  function pickPlayerTargets(ph, ballX, ballY, activeTeam){
    return playersRef.current.map((p,i)=>{
      const isHome=p.team==='home';
      const isActive=p.team===activeTeam;
      const role=p.role||'MID';
      const base=p.base||{x:50,y:50};
      let tx,ty;

      // Portero: casi siempre en su portería, pequeño movimiento lateral
      if(role==='GK'){
        const gkY=isHome?88:12;
        const ballSide=ballX<50?35:65;
        tx=Math.max(35,Math.min(65,base.x+(ballSide-50)*0.2+(Math.random()-0.5)*4));
        ty=gkY+(Math.random()-0.5)*3;
        // Si atacan muy cerca de la portería, el portero baja/sube un poco
        const dangerY=isHome?ballY<25:ballY>75;
        if(dangerY) ty=gkY+(isHome?-3:3);
        return {x:tx,y:ty};
      }

      if(ph==='goal'){
        // Gol: todos vuelven a posición base
        return {x:base.x+(Math.random()-0.5)*5, y:base.y+(Math.random()-0.5)*5};
      }

      if(ph==='attack'&&isActive){
        // Equipo atacando: avanza según rol
        if(role==='CB'){
          // Defensas centrales suben hasta mediocampo como mucho
          const maxAdvance=isHome?55:45;
          tx=base.x+(Math.random()-0.5)*15;
          ty=isHome?Math.min(base.y,maxAdvance+(Math.random()-0.5)*8):Math.max(base.y,maxAdvance+(Math.random()-0.5)*8);
        } else if(role==='FB'){
          // Laterales suben bastante
          tx=base.x+(Math.random()-0.5)*10;
          ty=isHome?base.y-15+(Math.random()-0.5)*10:base.y+15+(Math.random()-0.5)*10;
          ty=isHome?Math.max(20,ty):Math.min(80,ty);
        } else if(role==='MID'){
          tx=ballX+(Math.random()-0.5)*20;
          ty=ballY+(Math.random()-0.5)*15;
        } else if(role==='WG'){
          // Extremos van al área por banda
          tx=isHome?(base.x<50?15:85):(base.x<50?15:85);
          ty=isHome?ballY-5+(Math.random()-0.5)*10:ballY+5+(Math.random()-0.5)*10;
          ty=isHome?Math.max(10,ty):Math.min(90,ty);
        } else if(role==='ATT'){
          // Delanteros presionan puerta
          const goalX=40+Math.random()*20;
          const goalY=isHome?10+(Math.random()-0.5)*12:90+(Math.random()-0.5)*12;
          tx=goalX; ty=goalY;
        }
      } else if(ph==='defend'&&isActive||(!isActive&&ph==='attack')){
        // Equipo defendiendo: compacto, vuelven a posición
        if(role==='GK'){
          // Ya manejado arriba
        } else if(role==='ATT'||role==='WG'){
          // Atacantes presionan al portador rival
          tx=ballX+(Math.random()-0.5)*18;
          ty=ballY+(Math.random()-0.5)*12;
        } else if(role==='CB'){
          // Defensas se quedan en su línea
          tx=base.x+(Math.random()-0.5)*10;
          ty=base.y+(Math.random()-0.5)*6;
        } else if(role==='FB'){
          tx=base.x+(Math.random()-0.5)*8;
          ty=base.y+(Math.random()-0.5)*6;
        } else {
          // Mediocampistas se repliegan
          tx=base.x+(Math.random()-0.5)*12;
          const repY=isHome?base.y+8:base.y-8;
          ty=repY+(Math.random()-0.5)*10;
        }
      } else if(ph==='corner'){
        // Corner: atacantes al área, defensores también
        if(isActive){
          if(role==='ATT'||role==='MID'||role==='WG'){
            const areaX=30+Math.random()*40;
            const areaY=isHome?8+Math.random()*15:77+Math.random()*15;
            tx=areaX; ty=areaY;
          } else { tx=base.x+(Math.random()-0.5)*10; ty=base.y+(Math.random()-0.5)*8; }
        } else {
          if(role==='GK'){tx=base.x;ty=base.y;}
          else {tx=base.x+(Math.random()-0.5)*12; ty=base.y+(Math.random()-0.5)*8;}
        }
      } else {
        // Posesión: ligera jitter alrededor de la posición base
        tx=base.x+(Math.random()-0.5)*12;
        ty=base.y+(Math.random()-0.5)*10;
      }

      // Clamp para que nadie salga del campo
      tx=Math.max(3,Math.min(97,tx||base.x));
      ty=Math.max(3,Math.min(97,ty||base.y));
      return {x:tx,y:ty};
    });
  }

  // Animation loop - lerp ball and players
  useEffect(()=>{
    let last=performance.now();
    function animate(now){
      const dt=Math.min((now-last)/1000, 0.1);
      last=now;
      // Lerp ball
      const bspeed=6*dt;
      ballRef.current={
        x:ballRef.current.x+(ballTargetRef.current.x-ballRef.current.x)*bspeed,
        y:ballRef.current.y+(ballTargetRef.current.y-ballRef.current.y)*bspeed
      };
      setBall({...ballRef.current});
      // Lerp players
      const pspeed=3*dt;
      playersRef.current=playersRef.current.map((p,i)=>{
        const t=targetsRef.current[i]||{x:p.x,y:p.y};
        return {...p,
          x:p.x+(t.x-p.x)*pspeed,
          y:p.y+(t.y-p.y)*pspeed
        };
      });
      setPlayers([...playersRef.current]);
      animRef.current=requestAnimationFrame(animate);
    }
    animRef.current=requestAnimationFrame(animate);
    return ()=>cancelAnimationFrame(animRef.current);
  },[]);

  // Simulation tick
  useEffect(()=>{
    if(finished||paused||isHalf) return;
    intervalRef.current=setInterval(()=>{
      secRef.current+=speed;
      const s=secRef.current;
      setSec(s);

      // Game minute
      let gmin;
      if(s<=45*60) gmin=Math.floor(s/60);
      else if(s<=45*60+HALF_BREAK) gmin=45;
      else gmin=45+Math.floor((s-45*60-HALF_BREAK)/60);

      // Halftime
      if(s>45*60&&s<=45*60+HALF_BREAK&&!isHalf){
        setIsHalf(true);
        setLog(l=>[...l,{min:45,text:pickComm(COMM_HALFTIME),icon:'☕',type:'halftime'}]);
        playSound('whistle',audioCtx);
        setTimeout(()=>setIsHalf(false),(HALF_BREAK*1000)/speed);
      }
      // Full time
      if(s>=TOTAL_SECS){
        clearInterval(intervalRef.current);
        setFinished(true);
        setLog(l=>[...l,{min:90,text:pickComm(COMM_FULLTIME),icon:'🏁',type:'fulltime'}]);
        playSound('whistle',audioCtx);
        return;
      }

      // Fire pending events
      const toFire=pendingRef.current.filter(ev=>ev.min<=gmin);
      if(toFire.length){
        pendingRef.current=pendingRef.current.filter(ev=>ev.min>gmin);
        toFire.forEach(ev=>{
          setLog(l=>{
            if(l.find(x=>x.min===ev.min&&x.type===ev.type)) return l;
            return [...l,ev];
          });
          // Sound
          if(ev.type==='goal') playSound('goal',audioCtx);
          else if(ev.type==='yellow') playSound('yellow',audioCtx);
          else if(ev.type==='foul'||ev.type==='corner') playSound('whistle',audioCtx);
          else playSound('crowd_low',audioCtx);
          // Phase change
          const ph=ev.type==='goal'?'goal':ev.type==='corner'?'corner':ev.type==='miss'||ev.type==='danger'?'attack':ev.type==='foul'?'defend':'possession';
          phaseRef.current=ph;
          const activeTeam=ev.team==='neutral'?(Math.random()>0.5?'home':'away'):ev.team;
          const bt=pickBallTarget(ph,activeTeam);
          ballTargetRef.current=bt;
          const pts=pickPlayerTargets(ph,bt.x,bt.y,activeTeam);
          targetsRef.current=pts;
          // After event, return to possession
          setTimeout(()=>{
            phaseRef.current='possession';
            const bt2={x:rnd(25,75),y:rnd(30,70)};
            ballTargetRef.current=bt2;
            targetsRef.current=pickPlayerTargets('possession',bt2.x,bt2.y,Math.random()>0.5?'home':'away');
          },3000/speed);
        });
      }

      // Random micro-actions every ~8 seconds of real time (more fluid)
      if(Math.random()<0.15){
        playSound('kick',audioCtx);
        const team=Math.random()>0.5?'home':'away';
        const ph=['possession','possession','attack','defend'][rndInt(0,3)];
        const bt=pickBallTarget(ph,team);
        ballTargetRef.current=bt;
        targetsRef.current=pickPlayerTargets(ph,bt.x,bt.y,team);
      }
    },1000);
    return ()=>clearInterval(intervalRef.current);
  },[paused,isHalf,speed,finished,audioCtx]);

  useEffect(()=>{
    if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight;
  },[log]);

  useEffect(()=>{
    if(finished) setTimeout(()=>onFinish&&onFinish(matchData.homeGoals,matchData.awayGoals),2500);
  },[finished]);

  // Score
  let scoreH=0,scoreA=0;
  const gmin=sec<=45*60?Math.floor(sec/60):45+Math.floor(Math.max(0,sec-45*60-HALF_BREAK)/60);
  matchData.events.forEach(ev=>{if(ev.min<=gmin&&ev.type==='goal'){if(ev.team==='home')scoreH++;else scoreA++;}});

  const progress=Math.min(100,(sec/TOTAL_SECS)*100);
  const hRat=(homeTeam.ratings&&homeTeam.ratings.midfield||8)+1;
  const aRat=(awayTeam.ratings&&awayTeam.ratings.midfield||8);
  const posH=Math.round((hRat/(hRat+aRat))*100);

  // Pitch dimensions for canvas-like SVG
  const PW=400, PH=280;

  function initAudio(){
    if(!audioCtx){
      const ctx=createAudio();
      setAudioCtx(ctx);
    }
  }

  return h('div',null,
    // ── Score bar ─────────────────────────────────────────────────────────
    h('div',{style:{background:'linear-gradient(135deg,var(--pitch) 0%,var(--surface) 100%)',borderRadius:'12px',padding:'16px 20px',marginBottom:'10px',border:'1px solid rgba(232,184,75,0.2)'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
        h('span',{style:{fontFamily:'var(--font-head)',fontSize:'13px',fontWeight:700,letterSpacing:'1px',color:'var(--t2)',flex:1,textAlign:'left',textTransform:'uppercase'}},homeTeam.name),
        h('div',{style:{textAlign:'center',flex:1}},
          h('div',{style:{fontFamily:'var(--font-head)',fontSize:'52px',fontWeight:900,letterSpacing:'6px',color:'var(--t1)',lineHeight:1}},scoreH+' — '+scoreA),
          isHalf
            ?h('div',{style:{fontFamily:'var(--font-head)',fontSize:'14px',color:'var(--gold)',letterSpacing:'2px',marginTop:'2px'}},'— DESCANSO —')
            :finished
            ?h('div',{style:{fontFamily:'var(--font-head)',fontSize:'12px',color:'var(--t2)',letterSpacing:'2px',marginTop:'2px'}},'FINAL')
            :h('div',{style:{fontFamily:'var(--font-head)',fontSize:'16px',fontWeight:800,color:'var(--gold)',letterSpacing:'2px',marginTop:'2px'}},String(gmin).padStart(2,'0')+"'")
        ),
        h('span',{style:{fontFamily:'var(--font-head)',fontSize:'13px',fontWeight:700,letterSpacing:'1px',color:'var(--t2)',flex:1,textAlign:'right',textTransform:'uppercase'}},awayTeam.name)
      ),
      // Progress
      h('div',{style:{height:'3px',background:'var(--surface3)',borderRadius:'2px',marginBottom:'8px',overflow:'hidden'}},
        h('div',{style:{height:'100%',width:progress+'%',background:'linear-gradient(90deg,var(--grass-light),var(--gold))',borderRadius:'2px',transition:'width 0.5s linear'}})
      ),
      // Possession
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}},
        h('span',{style:{fontFamily:'var(--font-head)',fontSize:'10px',fontWeight:700,color:'var(--t3)',width:'28px',textAlign:'right'}},posH+'%'),
        h('div',{style:{flex:1,height:'4px',borderRadius:'2px',overflow:'hidden',background:'var(--info)'}},
          h('div',{style:{height:'100%',width:posH+'%',background:'var(--gold)',transition:'width 1s ease'}})
        ),
        h('span',{style:{fontFamily:'var(--font-head)',fontSize:'10px',fontWeight:700,color:'var(--t3)',width:'28px'}},(100-posH)+'%')
      ),
      // Controls
      h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',alignItems:'center'}},
        !audioCtx&&h('button',{className:'btn',style:{background:'rgba(232,184,75,0.1)',borderColor:'var(--gold)',color:'var(--gold)',fontSize:'11px'},onClick:initAudio},'🔊 Activar sonido'),
        !finished&&h('button',{className:'speed-btn'+(paused?' active':''),onClick:()=>setPaused(p=>!p)},paused?'▶ Reanudar':'⏸ Pausa'),
        ...[1,5,10,30].map(s=>h('button',{key:s,className:'speed-btn'+(speed===s&&!paused?' active':''),onClick:()=>{setSpeed(s);setPaused(false);}},s+'x'))
      )
    ),

    // ── PITCH VISUALIZER ──────────────────────────────────────────────────

function doTraining(team) {
  return doTrainingWithLog(team).team;
}

// Sistema de entrenamiento semanal estilo Hattrick
// - Foco principal: jugadores en posición correcta mejoran la habilidad
// - Resistencia sube lento a todos cada semana
// - Jóvenes (<24) mejoran el doble
// - Atributos especiales (velocidad, físico, técnica) suben aleatoriamente
// - Forma: sube si entrena bien, baja si no coincide con posición
function doTrainingWithLog(team) {
  const focus=team.trainFocus;
  const log=[];
  const posOk={
    porteria:p=>p.pos==='POR',
    defensa:p=>['DFC','CAR','LAT'].includes(p.pos),
    jugadas:p=>['MED','MCO'].includes(p.pos),
    lateral:p=>['LAT','EXT'].includes(p.pos),
    anotacion:p=>['DEL','EXT','MCO'].includes(p.pos),
    'balon parado':p=>true,
    resistencia:p=>true
  };
  const newPlayers=team.players.map(p=>{
    let sk={...p.skills},adv={...p.advSkills};
    const young=p.age<24;
    const chanceMain=young?0.40:0.20;
    const chanceOff=young?0.10:0.05;
    const isPos=posOk[focus]?posOk[focus](p):false;
    const playerLog={name:p.name,pos:p.pos,mejoras:[]};

    // Habilidad principal del foco
    if(isPos&&Math.random()<chanceMain&&sk[focus]<20){
      sk[focus]++;
      playerLog.mejoras.push(`${focus} ${sk[focus]-1}→${sk[focus]}`);
    } else if(!isPos&&focus!=='resistencia'&&focus!=='balon parado'&&Math.random()<chanceOff&&sk[focus]<20){
      sk[focus]++;
      playerLog.mejoras.push(`${focus} ${sk[focus]-1}→${sk[focus]} (fuera posición)`);
    }

    // Resistencia: todos suben lento cada semana
    if(focus!=='resistencia'&&Math.random()<0.08&&sk.resistencia<20){
      sk.resistencia++;
      playerLog.mejoras.push(`resistencia ${sk.resistencia-1}→${sk.resistencia}`);
    } else if(focus==='resistencia'&&Math.random()<chanceMain*0.7&&sk.resistencia<20){
      sk.resistencia++;
      playerLog.mejoras.push(`resistencia ${sk.resistencia-1}→${sk.resistencia}`);
    }

    // Atributos especiales (velocidad, físico, técnica) — aleatorio cada semana
    if(Math.random()<0.10){
      const k=['velocidad','fisico','tecnica'][rnd(0,2)];
      if(adv[k]<18){
        adv[k]++;
        playerLog.mejoras.push(`${k} ${adv[k]-1}→${adv[k]}`);
      }
    }

    // Forma: sube si entrena en posición, baja si no
    let forma=(p.forma||5);
    if(isPos) { if(Math.random()<0.3&&forma<10) forma=Math.min(10,forma+1); }
    else { if(Math.random()<0.2&&forma>1) forma=Math.max(1,forma-1); }

    if(playerLog.mejoras.length>0) log.push(playerLog);
    return {...p,skills:sk,advSkills:adv,age:p.age+(1/52),forma};
  });
  return {team:{...team,players:newPlayers},log};
}

// ── SKILL ROW (componente global para evitar remount) ─────────────────────────
function SkillRow({label,val}) {
  const v=Math.round(val);
  return h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'5px',fontSize:'12px'}},
    h('span',{style:{color:'var(--text2)',minWidth:'100px'}},label),
    h('div',{style:{flex:1,margin:'0 10px'}},
      h('div',{className:'sbar'},
        h('div',{className:'sbar-bg'},h('div',{className:'sbar-fill',style:{width:`${v/20*100}%`,background:skillColor(v)}})),
        h('span',{style:{fontSize:'11px',minWidth:'14px',color:skillColor(v)}},v)
      )
    ),
    h('span',{style:{fontSize:'11px',color:skillColor(v),minWidth:'90px',textAlign:'right'}},skillName(v))
  );
}

// ── LOGIN BOX (componente externo para evitar remount en cada keystroke) ──────
function LoginBox({loginName,loginPass,setLoginName,setLoginPass,handleLogin,loading,msg,setScreen,setMsg}) {
  return h('div',{className:'login-wrap'},
    h('div',{className:'login-box'},
      h('div',{style:{display:'flex',justifyContent:'center',marginBottom:'20px'}},h(Logo,{size:36})),
      h('p',{className:'login-subtitle'},'Futbolisticamente perfecto'),
      msg&&h('div',{className:`msg ${msg.type}`},msg.text),
      h('div',{className:'fg'},h('label',null,'Manager'),h('input',{value:loginName,onChange:e=>setLoginName(e.target.value),placeholder:'Tu nombre de manager',onKeyDown:e=>e.key==='Enter'&&handleLogin()})),
      h('div',{className:'fg'},h('label',null,'Contrasena'),h('input',{type:'password',value:loginPass,onChange:e=>setLoginPass(e.target.value),placeholder:'Tu contrasena',onKeyDown:e=>e.key==='Enter'&&handleLogin()})),
      h('button',{className:'btn primary',style:{width:'100%',padding:'12px',marginBottom:'12px'},onClick:handleLogin,disabled:loading},loading?'Comprobando...':'Iniciar sesion'),
      h('div',{className:'sep'}),
      h('p',{style:{textAlign:'center',fontSize:'13px',color:'var(--text2)',margin:'12px 0'}},'Sin cuenta?'),
      h('button',{className:'btn',style:{width:'100%',padding:'10px'},onClick:()=>{setScreen('register');setMsg(null);}},'Crear cuenta nueva'),
      h('button',{className:'btn',style:{width:'100%',padding:'10px',marginTop:'8px',color:'var(--text2)'},onClick:()=>{setScreen('reset');setMsg(null);}},'Olvide mi contrasena'),
      h('p',{style:{marginTop:'16px',fontSize:'11px',color:'var(--text2)',textAlign:'center'}},'Liga de 8 equipos · Partidos los sabados 21h')
    )
  );
}

function LineupModal({team,fixture,onSave,onClose}) {
  const [players,setPlayers]=React.useState([...team.players]);
  const [formation,setFormation]=React.useState(team.formation);
  const [selected,setSelected]=React.useState(null); // índice global en players

  const starters=players.slice(0,11);
  const bench=players.slice(11);

  // Validación
  function validate(pl) {
    const st=pl.slice(0,11);
    const por=st.filter(p=>p.pos==='POR').length;
    const w=[];
    if(por===0) w.push('⚠ Ningún portero entre los titulares');
    if(por>1)   w.push('⚠ '+por+' porteros entre los titulares');
    return w;
  }
  const warnings=validate(players);

  function doSwap(i,j){
    const arr=[...players];
    [arr[i],arr[j]]=[arr[j],arr[i]];
    setPlayers(arr);
    setSelected(null);
  }

  function handleClick(globalIdx){
    if(selected===null){ setSelected(globalIdx); return; }
    if(selected===globalIdx){ setSelected(null); return; }
    doSwap(selected,globalIdx);
  }

  function save(){onSave({...team,players,formation});onClose();}

  const posColor={POR:'#FFD700',DFC:'#4fa3e0',CAR:'#4fa3e0',LAT:'#3fb950',MED:'#3fb950',MCO:'#bc8cff',EXT:'#e3b341',DEL:'#f85149'};
  function skMain(p){
    const sk=p.skills||{};
    if(p.pos==='POR') return sk.porteria||0;
    if(['DFC','CAR'].includes(p.pos)) return sk.defensa||0;
    if(p.pos==='LAT') return sk.lateral||0;
    if(['MED','MCO'].includes(p.pos)) return sk.jugadas||0;
    return sk.anotacion||0;
  }
  function skCol(v){return v>=15?'#3fb950':v>=10?'#58a6ff':v>=6?'#e3b341':'#f85149';}

  const slots=FORMATION_SLOTS[formation]||FORMATION_SLOTS['4-4-2'];

  // Campo visual SVG
  function PitchView(){
    return h('div',{style:{position:'relative',width:'100%',paddingBottom:'62%',background:'linear-gradient(180deg,#1a4a1f 0%,#1e5423 50%,#1a4a1f 100%)',borderRadius:'8px',overflow:'hidden',marginBottom:'14px',border:'1px solid rgba(255,255,255,0.1)'}},
      // Líneas del campo
      h('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%'},viewBox:'0 0 100 62',preserveAspectRatio:'none'},
        h('rect',{x:1,y:1,width:98,height:60,fill:'none',stroke:'rgba(255,255,255,0.25)',strokeWidth:0.5}),
        h('line',{x1:1,y1:31,x2:99,y2:31,stroke:'rgba(255,255,255,0.25)',strokeWidth:0.5}),
        h('circle',{cx:50,cy:31,r:8,fill:'none',stroke:'rgba(255,255,255,0.25)',strokeWidth:0.5}),
        h('circle',{cx:50,cy:31,r:0.8,fill:'rgba(255,255,255,0.5)'}),
        // Área grande arriba (portería rival)
        h('rect',{x:22,y:1,width:56,height:14,fill:'none',stroke:'rgba(255,255,255,0.2)',strokeWidth:0.4}),
        // Área pequeña arriba
        h('rect',{x:36,y:1,width:28,height:6,fill:'none',stroke:'rgba(255,255,255,0.2)',strokeWidth:0.4}),
        // Área grande abajo (tu portería)
        h('rect',{x:22,y:47,width:56,height:14,fill:'none',stroke:'rgba(255,255,255,0.2)',strokeWidth:0.4}),
        // Área pequeña abajo
        h('rect',{x:36,y:55,width:28,height:6,fill:'none',stroke:'rgba(255,255,255,0.2)',strokeWidth:0.4}),
        // Rayas de césped
        ...[10,20,30,40,50,60,70,80,90].map(x=>h('line',{key:x,x1:x,y1:0,x2:x,y2:62,stroke:'rgba(255,255,255,0.04)',strokeWidth:3}))
      ),
      // Jugadores en el campo
      slots.map(([sx,sy,slotLabel,validPos],i)=>{
        const p=starters[i];
        const isSelected=selected===i;
        const fits=p&&validPos.includes(p.pos);
        const col=p?(posColor[p.pos]||'#aaa'):'rgba(255,255,255,0.3)';
        const ms=p?skMain(p):0;
        // sy viene en % desde arriba con origen arriba=ataque, abajo=defensa
        // El campo visual: abajo=defensa(portería propia), arriba=ataque
        return h('div',{
          key:i,
          onClick:()=>handleClick(i),
          style:{
            position:'absolute',
            left:sx+'%', top:sy+'%',
            transform:'translate(-50%,-50%)',
            cursor:'pointer',
            zIndex:10,
            display:'flex',flexDirection:'column',alignItems:'center',
            gap:'2px'
          }
        },
          // Círculo del jugador
          h('div',{style:{
            width:'32px',height:'32px',borderRadius:'50%',
            background:p?col+'33':'rgba(255,255,255,0.08)',
            border:'2px solid '+(isSelected?'#f0c040':p?(fits?col:'#f85149'):'rgba(255,255,255,0.3)'),
            display:'flex',alignItems:'center',justifyContent:'center',
            boxShadow:isSelected?'0 0 8px rgba(240,192,64,0.8)':p&&!fits?'0 0 6px rgba(248,81,73,0.5)':'0 2px 6px rgba(0,0,0,0.5)',
            transition:'all 0.15s',
            position:'relative'
          }},
            p
              ?h('div',{style:{textAlign:'center'}},
                  h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'11px',color:skCol(ms),lineHeight:1}},ms),
                  h('div',{style:{fontSize:'7px',color:'rgba(255,255,255,0.7)',lineHeight:1}},p.pos)
                )
              :h('div',{style:{fontSize:'14px',color:'rgba(255,255,255,0.4)',lineHeight:1}},'?')
          ),
          // Nombre debajo
          h('div',{style:{
            fontSize:'8px',fontWeight:600,
            color:isSelected?'#f0c040':p?'rgba(255,255,255,0.9)':'rgba(255,255,255,0.4)',
            background:'rgba(0,0,0,0.65)',
            padding:'1px 4px',borderRadius:'3px',
            maxWidth:'48px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
            textAlign:'center',
            border:isSelected?'1px solid rgba(240,192,64,0.5)':p&&!fits?'1px solid rgba(248,81,73,0.4)':'none'
          }},p?p.name.split(' ').slice(-1)[0]:slotLabel)
        );
      })
    );
  }

  // Fila de jugador para lista de banquillo
  function BenchRow({p,globalIdx}){
    const isSelected=selected===globalIdx;
    const col=posColor[p.pos]||'#aaa';
    const ms=skMain(p);
    return h('div',{onClick:()=>handleClick(globalIdx),style:{
      display:'flex',alignItems:'center',gap:'8px',padding:'6px 10px',
      borderRadius:'7px',marginBottom:'3px',cursor:'pointer',transition:'all 0.15s',
      background:isSelected?'rgba(240,192,64,0.15)':'rgba(255,255,255,0.02)',
      border:'1px solid '+(isSelected?'rgba(240,192,64,0.5)':'var(--border)'),
      boxShadow:isSelected?'0 0 0 2px rgba(240,192,64,0.2)':'none'
    }},
      h('span',{style:{fontSize:'10px',fontWeight:700,padding:'2px 5px',borderRadius:'4px',
        background:col+'22',color:col,border:'1px solid '+col+'44',flexShrink:0,minWidth:'32px',textAlign:'center'}},p.pos),
      h('span',{style:{flex:1,fontSize:'12px',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},p.name),
      h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'16px',color:skCol(ms),flexShrink:0}},ms),
      isSelected&&h('span',{style:{color:'var(--gold)',fontSize:'12px',flexShrink:0}},'●')
    );
  }

  return h('div',{className:'modal-overlay',onClick:e=>{if(e.currentTarget===e.target)onClose();}},
    h('div',{className:'modal-box',style:{width:'520px',maxWidth:'96vw',maxHeight:'92vh',overflowY:'auto'}},
      // Header
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}},
        h('div',null,
          h('div',{style:{fontFamily:"'Bebas Neue',sans-serif",fontSize:'20px',letterSpacing:'1px'}},'Alineación — '+formation),
          fixture&&h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'2px'}},
            'J'+fixture.jornada+' · vs '+fixture.opp+' · '+(fixture.isHome?'Local':'Visitante'))
        ),
        h('button',{className:'btn',style:{padding:'4px 10px'},onClick:onClose},'✕')
      ),

      // Selector de formación
      h('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap',marginBottom:'10px'}},
        FORMATIONS.map(f=>h('button',{key:f,className:'btn '+(formation===f?'primary':''),
          style:{padding:'4px 9px',fontSize:'11px',flex:'1 0 auto'},
          onClick:()=>{setFormation(f);setSelected(null);}},f))
      ),

      // Instrucción
      h('div',{style:{fontSize:'11px',color:'var(--text2)',marginBottom:'8px',padding:'6px 10px',
        background:'rgba(88,166,255,0.06)',borderRadius:'6px',border:'1px solid rgba(88,166,255,0.12)'}},
        selected!==null
          ? '● '+players[selected].name+' seleccionado — clic en otro para intercambiar'
          : '👆 Clic en un jugador del campo o banquillo para seleccionarlo, luego clic en otro para intercambiarlos'
      ),

        ? h('div',{style:{fontSize:'12px',color:'var(--text3)',textAlign:'center',padding:'10px'}},'Sin suplentes')

}

function App() {
  const [screen,setScreen]=useState('login');
  const [tab,setTab]=useState('Inicio');
  const [user,setUser]=useState('');
  const [team,setTeam]=useState(null);
  const [league,setLeague]=useState(null); // shared league object
  const [matchResult,setMatchResult]=useState(null);
  const [liveData,setLiveData]=useState(null); // {timeline,...} for live match
  const [liveTeams,setLiveTeams]=useState(null);
  const [livePhase,setLivePhase]=useState('idle'); // idle|live|finished
  const [liveIsLeague,setLiveIsLeague]=useState(false); // is it a real league match?
  const [livePendingJornada,setLivePendingJornada]=useState(null);
  const [livePendingMatchIdx,setLivePendingMatchIdx]=useState(null);
  const [simCountdown,setSimCountdown]=useState(null); // seconds until sim starts
  const [simPending,setSimPending]=useState(false);
  const [msg,setMsg]=useState(null);
  const [loginName,setLoginName]=useState('');
  const [loginPass,setLoginPass]=useState('');
  const [regName,setRegName]=useState('');
  const [regPass,setRegPass]=useState('');
  const [regPass2,setRegPass2]=useState('');
  const [regTeam,setRegTeam]=useState('');
  const [pendingUser,setPendingUser]=useState(null);
  const [resetName,setResetName]=useState('');
  const [resetTeam,setResetTeam]=useState('');
  const [resetPass,setResetPass]=useState('');
  const [resetPass2,setResetPass2]=useState('');
  const [market,setMarket]=useState([]);
  const [selPlayer,setSelPlayer]=useState(null);
  const [lineupFixture,setLineupFixture]=useState(null);
  const [trainLog,setTrainLog]=useState([]); // resultados del último entrenamiento
  const [friendlyResult,setFriendlyResult]=useState(null); // resultado amistoso martes
  const [playerTab,setPlayerTab]=useState('basicas');
  const [saveStatus,setSaveStatus]=useState('saved');
  const [loading,setLoading]=useState(false);
  const [countdown,setCountdown]=useState({});
  const saveTimer=useRef(null);
  const countdownTimer=useRef(null);
  const simTimer=useRef(null);

  useEffect(()=>{
    const saved=localStorage.getItem('golomer_v4_user');
    if(saved) setLoginName(saved);
    const mp=[];
    for(let i=0;i<12;i++) mp.push(genPlayer(POSITIONS[rnd(0,7)],rnd(6,15)));
    setMarket(mp);
  },[]);

  // countdown ticker
  useEffect(()=>{
    countdownTimer.current=setInterval(()=>{
      if(!league) return;
      const cd={};
      league.schedule.forEach(j=>{
        if(!j.matches.every(m=>m.played)) cd[j.jornada]=getCountdown(j.date);
      });
      setCountdown(cd);
      // Check if simCountdown active
      if(simPending) {
        setSimCountdown(s=>{
          if(s===null) return null;
          if(s<=1) { startSimMatch(); return null; }
          return s-1;
        });
      }
    },1000);
    return ()=>clearInterval(countdownTimer.current);
  },[league,simPending]);

  // auto-process pending league matches
  useEffect(()=>{
    if(!league||!team) return;
    processOverdueMatches();
    checkWeeklyEvents();
    const iv=setInterval(()=>{ if(league&&team){ processOverdueMatches(); checkWeeklyEvents(); } },5*60*1000);
    return ()=>clearInterval(iv);
  },[!!league,!!team]);

  // Eventos semanales automáticos:
  // Martes 12h → Amistoso vs bot
  // Jueves 6h  → Entrenamiento con log
  function checkWeeklyEvents() {
    if(!team) return;
    const now=new Date();
    const offset=getMadridOffset(now);
    const madridNow=new Date(now.getTime()+offset*3600000);
    const dow=madridNow.getUTCDay();   // 0=Dom,2=Mar,4=Jue
    const h=madridNow.getUTCHours();
    // Clave única por semana (número de semanas desde epoch)
    const weekKey=Math.floor(now.getTime()/(7*24*60*60*1000));

    // JUEVES >= 6h → entrenamiento automático
    if(dow===4 && h>=6 && (team._lastTrainWeek||0)<weekKey) {
      const result=doTrainingWithLog(team);
      const nt={...result.team,_lastTrainWeek:weekKey};
      setTeam(nt);
      setTrainLog(result.log);
      scheduleSave(user,nt);
      flash('🏋️ Entrenamiento del jueves completado','ok');
    }

    // MARTES >= 12h → amistoso automático
    if(dow===2 && h>=12 && (team._lastFriendlyWeek||0)<weekKey) {
      const botIdx=Math.floor(Math.random()*BOT_NAMES.length);
      const botT=genTeam(BOT_NAMES[botIdx].team,rnd(5,10));
      const md=generateMatchEvents(team,botT);
      const nt={...team,_lastFriendlyWeek:weekKey};
      setTeam(nt);
      setFriendlyResult({vs:botT.name,hG:md.finalScoreH,aG:md.finalScoreA,date:now.toISOString()});
      scheduleSave(user,nt);
      flash(`⚽ Amistoso: ${team.name} ${md.finalScoreH}-${md.finalScoreA} ${botT.name}`,'ok');
    }
  }

  function processOverdueMatches() {
    if(!league) return;
    let updatedLeague=league;
    let changed=false;
    const myTeamId=league.teams.find(t=>t.username===user)?.id;
    league.schedule.forEach((jornada)=>{
      // Solo procesar partidos cuya ventana de juego cerró (3h después del horario)
      const deadline=new Date(new Date(jornada.date).getTime()+3*60*60*1000);
      if(new Date()<deadline) return;
      jornada.matches.forEach((match,mIdx)=>{
        if(match.played) return;
        const homeEntry=league.teams.find(t=>t.id===match.home);
        const awayEntry=league.teams.find(t=>t.id===match.away);
        if(!homeEntry||!awayEntry) return;
        const isMyMatch=match.home===myTeamId||match.away===myTeamId;
        const hTeamBot=genTeam(homeEntry.name,rnd(5,10));
        const aTeamBot=genTeam(awayEntry.name,rnd(5,10));
        let hG,aG;
        if(isMyMatch&&myTeamId&&team) {
          // Partido del jugador no jugado: simular con su equipo real
          const myIsHome=match.home===myTeamId;
          const realPlayers=Array.isArray(team.players)?team.players:Object.values(team.players||{});
          const realTeam={...team,players:realPlayers};
          const hT=myIsHome?realTeam:hTeamBot;
          const aT=myIsHome?aTeamBot:realTeam;
          const result=quickSimulate(hT,aT);
          hG=result.hG; aG=result.aG;
        } else {
          const result=quickSimulate(hTeamBot,aTeamBot);
          hG=result.hG; aG=result.aG;
        }
        updatedLeague=applyMatchResult(updatedLeague,jornada.jornada,mIdx,hG,aG);
        changed=true;
      });
    });
    if(changed) {
      setLeague(updatedLeague);
      dbSaveLeague(updatedLeague);
    }
  }

  const scheduleSave=useCallback((u,t)=>{
    setSaveStatus('saving');
    if(saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(async()=>{
      const ok=await dbSave(u,t);
      setSaveStatus(ok?'saved':'err');
    },1200);
  },[]);

  function flash(text,type='info'){setMsg({text,type});setTimeout(()=>setMsg(null),3500);}

  async function loadLeagueAndMaybeInit(myEntry) {
    let lg=await dbLoadLeague();
    if(!lg) {
      // Create new league with bots + this user
      const entries=[myEntry,...BOT_NAMES.slice(0,6).map((b,i)=>createBotEntry(b,i))];
      // pad to 8 if needed
      while(entries.length<8) entries.push(createBotEntry(BOT_NAMES[entries.length-1],entries.length));
      lg=initLeague(entries.slice(0,8));
      // Force home/away alternation for real player from the start
      const pid=myEntry.id;
      let hc=0,ac=0;
      lg={...lg,schedule:lg.schedule.map(j=>({...j,matches:j.matches.map(m=>{
        if(m.home!==pid&&m.away!==pid) return m;
        if(m.home===pid) { if(hc<=ac){hc++;return m;} ac++;return {...m,home:m.away,away:m.home}; }
        if(ac<=hc){ac++;return m;} hc++;return {...m,home:m.away,away:m.home};
      })}))};
      await dbSaveLeague(lg);
    } else {
      // Check if user already in league
      const existing=lg.teams.find(t=>t.username===myEntry.username);
      if(!existing) {
        // Replace first bot
        const botIdx=lg.teams.findIndex(t=>t.isBot);
        if(botIdx!==-1) {
          const oldBot=lg.teams[botIdx];
          // new real player always starts with 0 points
          const newEntry={...myEntry,pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};
          // Remap bot id to player id in schedule
          let newSchedule=lg.schedule.map(j=>({...j,matches:j.matches.map(m=>({...m,
            home:m.home===oldBot.id?newEntry.id:m.home,
            away:m.away===oldBot.id?newEntry.id:m.away
          }))}));
          // Force home/away alternation for the real player
          let homeCount=0,awayCount=0;
          newSchedule=newSchedule.map(j=>({...j,matches:j.matches.map(m=>{
            if(m.home!==newEntry.id&&m.away!==newEntry.id) return m;
            if(m.played) { m.home===newEntry.id?homeCount++:awayCount++; return m; }
            // decide: if more homes than aways, make away; else keep home
            if(m.home===newEntry.id&&homeCount>awayCount) {
              homeCount++; return m; // already home, and balance ok
            }
            if(m.home===newEntry.id&&homeCount<=awayCount) {
              homeCount++; return m;
            }
            if(m.away===newEntry.id&&awayCount<=homeCount) {
              awayCount++; return m;
            }
            // swap
            if(m.home===newEntry.id) { awayCount++; return {...m,home:m.away,away:m.home}; }
            homeCount++; return {...m,home:m.away,away:m.home};
          })}));
          lg={...lg,teams:lg.teams.map((t,i)=>i===botIdx?newEntry:t),schedule:newSchedule};
          await dbSaveLeague(lg);
        }
      }
    }
    return lg;
  }

  async function enterGame(username,teamData) {
    const team=normalizeTeam(teamData);
    if(!team||!team.players||team.players.length===0){
      flash('Error: datos del equipo no validos','err');
      return;
    }
    setUser(username);
    setTeam(team);
    setScreen('game');
    localStorage.setItem('golomer_v4_user',username);
    try {
      const myEntry={id:'user_'+username,name:team.name,username,isBot:false,pts:0,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0};
      const lg=await loadLeagueAndMaybeInit(myEntry);
      setLeague(lg);
    } catch(e) {
      flash('Liga: '+e.message,'err');
    }
  }

  async function handleLogin() {
    if(!loginName.trim()||!loginPass.trim()){flash('Rellena todos los campos','err');return;}
    setLoading(true);
    try {
      const existing=await dbLoad(loginName.trim());
      if(!existing){flash('Manager no encontrado. Crea una cuenta.','err');setLoading(false);return;}
      const rawTeam=existing.team||existing;
      const teamData=normalizeTeam(rawTeam);
      const savedHash=teamData._passHash;
      if(!savedHash||savedHash!==simpleHash(loginPass)){flash('Contrasena incorrecta','err');setLoading(false);return;}
      await enterGame(loginName.trim(),teamData);
    } catch(e) {
      flash('Error Firebase: '+e.message,'err');
    }
    setLoading(false);
  }

  async function handleRegisterStep1() {
    if(!regName.trim()){flash('Introduce tu nombre de manager','err');return;}
    if(regPass.length<4){flash('Contrasena minimo 4 caracteres','err');return;}
    if(regPass!==regPass2){flash('Las contrasenias no coinciden','err');return;}
    setLoading(true);
    const existing=await dbLoad(regName.trim());
    if(existing){flash('Este nombre ya esta en uso','err');setLoading(false);return;}
    setPendingUser({name:regName.trim(),passHash:simpleHash(regPass)});
    setScreen('register2');setLoading(false);
  }

  async function handleRegisterStep2() {
    if(!regTeam.trim()){flash('Introduce el nombre de tu equipo','err');return;}
    if(!pendingUser){setScreen('login');return;}
    setLoading(true);
    const nt=genTeam(regTeam.trim(),7);
    nt._passHash=pendingUser.passHash;
    const ok=await dbSave(pendingUser.name,nt);
    if(ok) await enterGame(pendingUser.name,nt);
    else flash('Error de conexion. Intenta de nuevo.','err');
    setLoading(false);
  }

  async function handleReset() {
    if(!resetName.trim()||!resetTeam.trim()){flash('Rellena todos los campos','err');return;}
    if(resetPass.length<4){flash('Contrasena minimo 4 caracteres','err');return;}
    if(resetPass!==resetPass2){flash('Las contrasenias no coinciden','err');return;}
    setLoading(true);
    const existing=await dbLoad(resetName.trim());
    if(!existing){flash('Manager no encontrado','err');setLoading(false);return;}
    if(!existing.team||existing.team.name.toLowerCase().trim()!==resetTeam.toLowerCase().trim()){flash('El nombre del equipo no coincide','err');setLoading(false);return;}
    const updatedTeam={...existing.team,_passHash:simpleHash(resetPass)};
    const ok=await dbSave(resetName.trim(),updatedTeam);
    if(ok){flash('Contrasena actualizada. Inicia sesion.','ok');setTimeout(()=>{setScreen('login');setLoginName(resetName.trim());setLoginPass('');setMsg(null);},1800);}
    else flash('Error al guardar. Intenta de nuevo.','err');
    setLoading(false);
  }

  // ── SIM MATCH ──────────────────────────────────────────────────────────────
  function requestSimMatch() {
    setSimPending(true);
    setSimCountdown(300); // 5 minutes = 300 seconds
    flash('Partido de simulacion programado para dentro de 5 minutos!','info');
  }

  function cancelSim() {
    setSimPending(false);
    setSimCountdown(null);
    flash('Simulacion cancelada','info');
  }

  function startSimMatch() {
    setSimPending(false); setSimCountdown(null);
    localStorage.removeItem('golomer_sim_end');
    const bot=genTeam('Bot Simulacion',rnd(5,11));
    const isHome=Math.random()<0.5;
    const homeT=isHome?team:bot, awayT=isHome?bot:team;
    const md=generateMatchEvents(homeT,awayT);
    setLiveData(md);
    setLiveTeams({home:homeT,away:awayT});
    setLiveIsLeague(false);
    setLivePhase('live');
    setTab('Ultimo partido');
    flash('¡Partido en marcha! Ve a Último Partido para verlo.','ok');
  }

  function finishLiveMatch(scoreH,scoreA) {
    if(!liveTeams||!liveData) return;
    const isHome=liveTeams.home.name===team.name;
    const myG=isHome?scoreH:scoreA,oppG=isHome?scoreA:scoreH;
    const income=isHome?(liveData.ticketIncome||0)+(liveData.sponsorIncome||0):(liveData.sponsorIncome||0);
    const totalSal=team.players.reduce((s,p)=>s+p.salary,0);
    const trained=doTraining(team);

    if(liveIsLeague&&livePendingJornada!=null&&livePendingMatchIdx!=null) {
      // Update real league result
      const updatedLeague=applyMatchResult(league,livePendingJornada,livePendingMatchIdx,isHome?myG:oppG,isHome?oppG:myG);
      setLeague(updatedLeague);
      dbSaveLeague(updatedLeague);
      // Update my league row
    }

    const ft={...trained,money:trained.money+income-totalSal,results:[...(trained.results||[]),{week:team.week||1,vs:liveTeams[isHome?'away':'home'].name,home:isHome,my:myG,opp:oppG}],week:(team.week||1)+1};
    const myTeamEntry=league?.teams.find(t=>t.username===user);
    const newLR=myTeamEntry?{...myTeamEntry,pts:myTeamEntry.pts+(myG>oppG?3:myG===oppG?1:0),pj:myTeamEntry.pj+1,pg:myTeamEntry.pg+(myG>oppG?1:0),pe:myTeamEntry.pe+(myG===oppG?1:0),pp:myTeamEntry.pp+(myG<oppG?1:0),gf:myTeamEntry.gf+myG,gc:myTeamEntry.gc+oppG}:null;
    setMatchResult({isHome,myTeam:team.name,oppTeam:liveTeams[isHome?'away':'home'].name,myG,oppG,income,salaryCost:totalSal,week:team.week||1,hxG:liveData.hxG,axG:liveData.axG,myR:isHome?liveData.ratings?.home:liveData.ratings?.away,isLeague:liveIsLeague});
    setTeam(ft);
    if(newLR) {
      const updLeague={...league,teams:league.teams.map(t=>t.username===user?newLR:t)};
      setLeague(updLeague);
      dbSaveLeague(updLeague);
    }
    scheduleSave(user,ft);
    setLivePhase('finished');
  }

  // ── MY NEXT FIXTURE ───────────────────────────────────────────────────────
  function getMyFixtures() {
    if(!league||!user) return [];
    const myId=league.teams.find(t=>t.username===user)?.id;
    if(!myId) return [];
    const fixtures=[];
    league.schedule.forEach(jornada=>{
      jornada.matches.forEach((m,mIdx)=>{
        if(m.home===myId||m.away===myId) {
          const isHome=m.home===myId;
          const oppId=isHome?m.away:m.home;
          const opp=league.teams.find(t=>t.id===oppId);
          fixtures.push({jornada:jornada.jornada,date:jornada.date,isHome,opp:opp?.name||'?',oppId,played:m.played,scoreH:m.scoreH,scoreA:m.scoreA,matchIdx:mIdx,myId,isHome});
        }
      });
    });
    return fixtures;
  }

  function canPlayNow(fixtureDate) {
    const d=new Date(fixtureDate);
    const now=new Date();
    const diff=d.getTime()-now.getTime();
    // Can play from 30 min before until 3h after scheduled time
    return diff<=30*60*1000 && diff>=-3*60*60*1000;
  }

  function saveLineup(updatedTeam) {
    setTeam(updatedTeam);
    scheduleSave(user,updatedTeam);
    flash('Alineación guardada','ok');
  }

  function startLeagueMatch(fixture) {
    const bot=genTeam(fixture.opp,rnd(6,11));
    const homeT=fixture.isHome?team:bot, awayT=fixture.isHome?bot:team;
    const md=generateMatchEvents(homeT,awayT);
    setLiveData(md);
    setLiveTeams({home:homeT,away:awayT});
    setLiveIsLeague(true);
    setLivePendingJornada(fixture.jornada);
    setLivePendingMatchIdx(fixture.matchIdx);
    setLivePhase('live');
    setTab('Ultimo partido');
    flash('¡Partido en marcha! Ve a Último Partido.','ok');
  }

  function buyPlayer(p) {
    const cost=p.salary*26;
    if(team.money<cost){flash('No tienes suficiente dinero','err');return;}
    const nt={...team,players:[...team.players,{...p,id:Date.now()}],money:team.money-cost};
    setTeam(nt);setMarket(market.filter(m=>m.id!==p.id));scheduleSave(user,nt);
    flash(`${p.name} fichado por ${fmt(cost)}`,'ok');
  }
  function sellPlayer(p) {
    if(team.players.length<=13){flash('Necesitas al menos 13 jugadores','err');return;}
    const price=p.salary*30;
    const nt={...team,players:team.players.filter(m=>m.id!==p.id),money:team.money+price};
    setTeam(nt);scheduleSave(user,nt);
    if(selPlayer?.id===p.id) setSelPlayer(null);
    flash(`${p.name} vendido por ${fmt(price)}`,'ok');
  }
  function setTrain(id){const nt={...team,trainFocus:id};setTeam(nt);scheduleSave(user,nt);flash(`Entrenamiento: ${id}`,'ok');}
  function setTactic(id){const nt={...team,tactic:id};setTeam(nt);scheduleSave(user,nt);flash(`Tactica: ${id}`,'ok');}
  function setFormation(f){const nt={...team,formation:f};setTeam(nt);scheduleSave(user,nt);flash(`Formacion: ${f}`,'ok');}
  function logout(){setUser('');setTeam(null);setLeague(null);setScreen('login');setMatchResult(null);setLivePhase('idle');}

  // ── PLAYER MODAL (inline, no component, to avoid remount issues) ──────────
  const playerModalEl = selPlayer ? h('div',{className:'modal-overlay',onClick:e=>{if(e.currentTarget===e.target)setSelPlayer(null);}},
    h('div',{className:'modal-box'},
      h('div',{style:{display:'flex',gap:'14px',alignItems:'flex-start',marginBottom:'16px'}},
        h(Avatar,{name:selPlayer.name,pos:selPlayer.pos,size:60}),
        h('div',{style:{flex:1}},
          h('div',{style:{fontSize:'16px',fontWeight:600}},selPlayer.name),
          h('div',{style:{fontSize:'12px',color:'var(--text2)',marginTop:'2px'}},`${selPlayer.pos} · ${Math.floor(selPlayer.age)} anos · ${selPlayer.nationality}`),
          h('div',{style:{fontSize:'12px',color:'var(--text2)'}},`Salario: ${fmt(selPlayer.salary)}/sem · TSI: ${selPlayer.tsi.toLocaleString('es-ES')}`)
        ),
        h('button',{className:'btn',style:{padding:'4px 10px',flexShrink:0},onClick:()=>setSelPlayer(null)},'X')
      ),
      h('div',{className:'tab-pills'},
        [['basicas','Basicas'],['avanzadas','Avanzadas'],['especiales','Especiales']].map(([t,l])=>
          h('button',{key:t,className:`tab-pill ${playerTab===t?'active':''}`,onClick:()=>setPlayerTab(t)},l)
        )
      ),
      playerTab==='basicas'&&h('div',null,
        h('div',{style:{marginBottom:'10px',display:'flex',gap:'6px',flexWrap:'wrap'}},
          h('span',{className:'badge badge-form'},FORM_LABELS[Math.min(selPlayer.form,7)]),
          h('span',{className:'badge badge-pos'},selPlayer.pos)
        ),
        Object.entries(selPlayer.skills).map(([k,v])=>h(SkillRow,{key:k,label:k,val:v}))
      ),
      playerTab==='avanzadas'&&h('div',null,
        Object.entries(selPlayer.advSkills).map(([k,v])=>h(SkillRow,{key:k,label:k,val:v}))
      ),
